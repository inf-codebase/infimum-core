site_name: infimum-core
site_description: Infimum core library — base, engine, database, AI, utils
site_url: https://github.com/inf-codebase/infimum-core

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            heading_level: 2

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - API Reference:
    - core.base: api/base.md
    - core.engine: api/engine.md
    - core.database: api/database.md
    - core.ai: api/ai.md
    - core.utils: api/utils.md
