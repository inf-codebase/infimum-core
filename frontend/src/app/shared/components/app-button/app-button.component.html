<button [type]="type" [class]="baseClasses + ' ' + sizeClasses + ' ' + variantClasses + (fullWidth ? ' w-full' : '')"
    [disabled]="disabled || loading" (click)="handleClick($event)">
    @if (loading) {
    <span class="loading loading-spinner"></span>
    <span>Loading...</span>
    } @else {
    @if (icon) {
    <i [class]="icon + ' mr-2'"></i>
    }
    <ng-content>{{ label }}</ng-content>
    }
</button>
