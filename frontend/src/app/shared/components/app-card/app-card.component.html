<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden flex flex-col"
    [class.h-full]="fullHeight">
    @if (title) {
    <div
        class="px-5 py-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50/50 dark:bg-gray-800/50">
        <div>
            <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100 tracking-tight">{{ title }}</h3>
            @if (subtitle) {
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">{{ subtitle }}</p>
            }
        </div>
        <ng-content select="[header-actions]"></ng-content>
    </div>
    }

    <div [class]="'flex-1 ' + paddingClass">
        <ng-content></ng-content>
    </div>

    <div class="mt-auto"> <!-- Footer slot wrapper if needed -->
        <ng-content select="[footer]"></ng-content>
    </div>
</div>
