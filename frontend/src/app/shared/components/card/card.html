<div
    class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-100 dark:border-gray-700 overflow-hidden h-full flex flex-col">
    @if (title() || subtitle()) {
    <div class="p-6 border-b border-gray-100 dark:border-gray-700">
        @if (title()) {
        <h3 class="text-xl font-bold text-gray-900 dark:text-gray-100">{{ title() }}</h3>
        }
        @if (subtitle()) {
        <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">{{ subtitle() }}</p>
        }
    </div>
    }
    <div class="p-6 flex-grow">
        <ng-content></ng-content>
    </div>
</div>
