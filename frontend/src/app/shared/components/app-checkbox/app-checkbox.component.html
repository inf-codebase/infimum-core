<label class="cursor-pointer label justify-start gap-2" [class.opacity-50]="isDisabled()">
    <input type="checkbox" class="checkbox checkbox-primary" [checked]="checked()" [disabled]="isDisabled()"
        (change)="toggle()" />
    @if (label) {
    <span class="label-text">{{ label }}</span>
    }
</label>
