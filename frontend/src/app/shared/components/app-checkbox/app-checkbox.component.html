<div class="flex items-center gap-2 cursor-pointer" (click)="toggle()">
    <div class="w-5 h-5 rounded border flex items-center justify-center transition-all duration-200"
        [class.bg-primary]="checked()" [class.border-primary]="checked()" [class.bg-surface]="!checked()"
        [class.border-surface-border]="!checked()" [class.opacity-50]="isDisabled()">
        @if (checked()) {
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-white" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
                d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                clip-rule="evenodd" />
        </svg>
        }
    </div>

    @if (label) {
    <label [for]="inputId" class="text-sm cursor-pointer select-none text-surface-foreground"
        [class.opacity-50]="isDisabled()">
        {{ label }}
    </label>
    }
</div>
