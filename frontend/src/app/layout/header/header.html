<header class="navbar bg-base-100 border-b border-base-200">
    <!-- Left: Sidebar Toggle -->
    <div class="flex-none">
        <button (click)="toggleSidebar.emit()" class="btn btn-square btn-ghost">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>
    </div>

    <!-- Right: User Menu & Actions -->
    <div class="flex-1 justify-end gap-2">
        <!-- Notifications -->
        <button class="btn btn-ghost btn-circle hidden md:inline-flex">
            <div class="indicator">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
                <span class="badge badge-xs badge-primary indicator-item"></span>
            </div>
        </button>

        <!-- User Dropdown -->
        <div class="dropdown dropdown-end">
            <div tabindex="0" role="button" class="btn btn-ghost flex items-center gap-2 px-2">
                <div class="avatar">
                    <div class="w-8 rounded-full">
                        <img src="https://ui-avatars.com/api/?name=Admin+User&background=random" alt="avatar" />
                    </div>
                </div>
                <div class="hidden md:flex flex-col text-left text-xs">
                    <span class="font-bold">Admin User</span>
                    <span class="opacity-70">Administrator</span>
                </div>
                <svg class="w-4 h-4 opacity-50 hidden md:block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </div>
            <ul tabindex="0"
                class="dropdown-content z-50 menu p-2 shadow bg-base-100 rounded-box w-52 border border-base-200">
                <li><a>Profile</a></li>
                <li><a>Settings</a></li>
                <li><a routerLink="/auth/login" class="text-error">Sign out</a></li>
            </ul>
        </div>
    </div>
</header>
