<div class="h-full flex flex-col bg-base-200 border-r border-base-300 text-base-content">
    <!-- Logo -->
    <div class="h-16 flex items-center justify-center border-b border-base-300">
        <div class="flex items-center gap-2 text-primary font-bold text-xl px-4 overflow-hidden">
            <!-- Logo SVG (Box) -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 flex-none text-primary" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
            <span class="whitespace-nowrap transition-opacity duration-300" [class.opacity-0]="isCollapsed()"
                [class.w-0]="isCollapsed()">
                Infimum
            </span>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto py-3 px-2">
        <ul class="menu w-full p-0">
            <li>
                <a routerLink="/admin/dashboard" routerLinkActive="active"
                    [attr.title]="isCollapsed() ? 'Dashboard' : null">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    <span class="transition-opacity duration-300" [class.opacity-0]="isCollapsed()"
                        [class.w-0]="isCollapsed()" [class.hidden]="isCollapsed()">
                        Dashboard
                    </span>
                </a>
            </li>
            <li>
                <a routerLink="/admin/settings" routerLinkActive="active"
                    [attr.title]="isCollapsed() ? 'Settings' : null">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span class="transition-opacity duration-300" [class.opacity-0]="isCollapsed()"
                        [class.w-0]="isCollapsed()" [class.hidden]="isCollapsed()">
                        Settings
                    </span>
                </a>
            </li>
        </ul>
    </nav>
</div>
