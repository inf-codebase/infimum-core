<div class="flex min-h-screen bg-gray-50 dark:bg-gray-900 transition-colors duration-300">
    <!-- Sidebar -->
    <app-sidebar [isCollapsed]="isSidebarCollapsed()"
        class="flex-none z-30 transition-all duration-300 shadow-2xl" [class.w-72]="!isSidebarCollapsed()"
        [class.w-20]="isSidebarCollapsed()" />

    <div class="flex flex-col flex-1 min-w-0 overflow-hidden">
        <!-- Header -->
        <app-header (toggleSidebar)="toggleSidebar()" class="flex-none z-20 shadow-sm" />

        <!-- Main Content -->
        <main class="flex-1 overflow-auto p-4 md:p-6 scroll-smooth">
            <div class="container mx-auto fade-in" style="max-width: 80rem">
                <router-outlet />
            </div>
        </main>

        <!-- Footer -->
        <app-footer class="flex-none" />
    </div>
</div>
