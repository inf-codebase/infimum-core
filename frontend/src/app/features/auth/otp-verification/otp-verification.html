<div class="w-full mx-auto fade-in" style="max-width: 28rem">
    <div class="text-center mb-5">
        <div class="mb-4 text-primary">
            <svg class="w-12 h-12 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 8l9 6 9-6m-18 0a2 2 0 012-2h14a2 2 0 012 2m-18 0v10a2 2 0 002 2h14a2 2 0 002-2V8" />
            </svg>
        </div>
        <h2 class="text-3xl font-bold text-gray-900 dark:text-gray-100 mb-2">Verify Email</h2>
        <p class="text-gray-600 dark:text-gray-400 m-0">Please enter the code sent to <br> <span
                class="font-medium text-gray-900 dark:text-gray-100">{{email}}</span></p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">

        <div class="flex justify-center">
            <!-- Simplified OTP input using standard text input for now -->
            <app-input formControlName="code" placeholder="1 2 3 4" class="text-center text-2xl tracking-widest"
                [error]="(form.get('code')?.touched && form.get('code')?.invalid) ? 'Code is required' : ''"></app-input>
        </div>

        <app-button label="Verify" type="submit" [loading]="isLoading()" [fullWidth]="true"
            [disabled]="form.invalid"></app-button>

        <div class="text-center mt-2">
            <p class="text-sm text-gray-600 dark:text-gray-400">
                Didn't receive the code?
                <button type="button"
                    class="text-primary font-medium hover:underline focus:outline-none">Resend</button>
            </p>
        </div>
    </form>
</div>
