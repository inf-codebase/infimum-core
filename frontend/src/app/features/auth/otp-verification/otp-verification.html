<div class="w-full max-w-md mx-auto fade-in text-center">
    <div class="mb-8">
        <div
            class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary-100 dark:bg-primary-900/20 text-primary-600 mb-6">
            <i class="pi pi-envelope text-2xl"></i>
        </div>
        <h2 class="text-3xl font-bold text-surface-900 dark:text-surface-0 mb-3">Check your email</h2>
        <p class="text-surface-600 dark:text-surface-400">
            We sent a verification code to <br /><span class="font-medium text-surface-900 dark:text-surface-0">{{ email
                }}</span>
        </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-8 items-center">

        <div class="flex justify-center w-full">
            <p-inputotp formControlName="code" [length]="4" styleClass="gap-4"></p-inputotp>
        </div>

        <div class="w-full flex flex-col gap-4">
            <p-button type="submit" label="Verify email" [loading]="isLoading()"
                [disabled]="form.invalid || form.value.code?.length !== 4" styleClass="w-full"></p-button>

            <p class="text-surface-600 dark:text-surface-400 text-sm">
                Didn't receive the code?
                <span class="text-primary-600 font-medium hover:underline cursor-pointer">Click to resend</span>
            </p>

            <a routerLink="/auth/login"
                class="text-surface-600 dark:text-surface-400 hover:text-surface-900 dark:hover:text-surface-0 font-medium text-sm no-underline hover:underline cursor-pointer transition-colors flex items-center justify-center gap-2 mt-2">
                <i class="pi pi-arrow-left"></i> Back to log in
            </a>
        </div>
    </form>
</div>
