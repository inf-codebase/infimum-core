<div class="w-full mx-auto fade-in" style="max-width: 28rem">
  @if (isSubmitted()) {
    <div class="text-center animate-fade-in">
      <div class="w-16 h-16 bg-primary/10 text-primary rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 12l2 2 4-4m7 2a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </div>

      <div class="text-gray-900 dark:text-gray-100 text-3xl font-bold mb-2">Check your email</div>
      <p class="text-gray-600 dark:text-gray-400 font-medium m-0">
        We sent password reset instructions to
        <span class="font-medium text-gray-900 dark:text-gray-100">{{ form.get('email')?.value }}</span>.
      </p>

      <div class="mt-6 p-4 bg-green-50 border border-green-200 rounded-lg text-center">
        <button
          type="button"
          (click)="isSubmitted.set(false)"
          class="text-sm font-medium text-green-700 hover:text-green-900 underline"
        >
          Send again
        </button>
      </div>
    </div>
  } @else {
    <div class="text-center mb-6">
      <div class="w-16 h-16 bg-primary/10 text-primary rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 7a4 4 0 11-8 0 4 4 0 018 0z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10 11l-2.5 2.5a2 2 0 000 2.828l.172.172a2 2 0 002.828 0L13 16m-3-3l3 3m-3-3l3-3m0 0l1.5-1.5a2 2 0 012.828 0l.172.172a2 2 0 010 2.828L16 14"
          />
        </svg>
      </div>
      <div class="text-gray-900 dark:text-gray-100 text-3xl font-bold mb-2">Forgot Password?</div>
      <p class="text-gray-600 dark:text-gray-400 font-medium m-0">
        Enter your email and we’ll send you a reset link.
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <app-input
        label="Email"
        formControlName="email"
        placeholder="Enter your email"
        [error]="
          form.get('email')?.touched && form.get('email')?.invalid ? 'Please enter a valid email' : ''
        "
      />

      <app-button
        label="Send Reset Link"
        type="submit"
        [loading]="isLoading()"
        [fullWidth]="true"
        [disabled]="form.invalid"
      />

      <div class="text-center mt-2">
        <a
          routerLink="/auth/login"
          class="font-bold text-primary hover:underline cursor-pointer flex items-center justify-center gap-2"
        >
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
          Back to Login
        </a>
      </div>
    </form>
  }
</div>
