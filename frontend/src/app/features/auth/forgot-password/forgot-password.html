<div class="w-full max-w-md mx-auto fade-in">
    @if (isSubmitted()) {
    <div class="text-center animate-fade-in">
        <div
            class="w-16 h-16 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="pi pi-check text-3xl"></i>
        </div>
        <h2 class="text-3xl font-bold text-surface-900 dark:text-surface-0 mb-3">Check your email</h2>
        <p class="text-surface-600 dark:text-surface-400 mb-8">
            We sent a password reset link to <br /><span class="font-medium text-surface-900 dark:text-surface-0">{{
                form.get('email')?.value }}</span>
        </p>

        <p class="text-surface-600 dark:text-surface-400 mb-8 max-w-xs mx-auto text-sm">
            Didn't receive the email? <span class="text-primary-600 cursor-pointer font-medium hover:underline">Click to
                resend</span>
        </p>

        <a routerLink="/auth/login"
            class="inline-flex items-center gap-2 text-primary-600 hover:text-primary-700 font-medium no-underline hover:underline cursor-pointer">
            <i class="pi pi-arrow-left"></i> Back to sign in
        </a>
    </div>
    } @else {
    <div class="mb-8 text-center md:text-left">
        <div
            class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary-100 dark:bg-primary-900/20 text-primary-600 mb-6">
            <i class="pi pi-key text-xl"></i>
        </div>
        <h2 class="text-3xl font-bold text-surface-900 dark:text-surface-0 mb-2">Forgot password?</h2>
        <p class="text-surface-600 dark:text-surface-400">No worries, we'll send you reset instructions.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
        <div class="flex flex-col gap-2">
            <label for="email" class="font-medium text-surface-900 dark:text-surface-0">Email</label>
            <input pInputText id="email" formControlName="email" placeholder="Enter your email" class="w-full" />
        </div>

        <p-button type="submit" label="Reset password" [loading]="isLoading()" [disabled]="form.invalid"
            styleClass="w-full"></p-button>

        <div class="mt-4 text-center">
            <a routerLink="/auth/login"
                class="text-surface-600 dark:text-surface-400 hover:text-surface-900 dark:hover:text-surface-0 font-medium text-sm no-underline hover:underline cursor-pointer transition-colors flex items-center justify-center gap-2">
                <i class="pi pi-arrow-left"></i> Back to log in
            </a>
        </div>
    </form>
    }
</div>
