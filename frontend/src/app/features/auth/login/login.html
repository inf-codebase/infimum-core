<div class="w-full mx-auto fade-in" style="max-width: 28rem">
    <div class="text-center mb-5">
        <h2 class="text-3xl font-bold text-gray-900 dark:text-gray-100 mb-2">Welcome Back</h2>
        <p class="text-gray-600 dark:text-gray-400 m-0">Sign in to continue to Infimum</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

        @if (error()) {
        <div class="p-3 bg-red-50 text-red-700 border border-red-200 rounded-lg text-sm">
            {{ error() }}
        </div>
        }

        <app-input label="Email" formControlName="email" placeholder="Enter your email"
            [error]="(form.get('email')?.touched && form.get('email')?.invalid) ? 'Please enter a valid email' : ''"></app-input>

        <app-input label="Password" type="password" formControlName="password" placeholder="••••••••"
            [error]="(form.get('password')?.touched && form.get('password')?.invalid) ? 'Password is required' : ''"></app-input>

        <div class="flex items-center justify-between">
            <app-checkbox label="Remember me" formControlName="rememberMe"></app-checkbox>

            <a routerLink="/auth/forgot-password"
                class="text-sm font-medium text-primary hover:text-primary-600 no-underline cursor-pointer transition-colors">
                Forgot password?
            </a>
        </div>

        <app-button label="Sign In" type="submit" [loading]="isLoading()" [fullWidth]="true"
            [disabled]="form.invalid"></app-button>

        <div class="text-center mt-2">
            <span class="text-gray-600 dark:text-gray-400">Don't have an account?</span>
            <a routerLink="/auth/register" class="font-bold text-primary hover:underline ml-2 cursor-pointer">Sign
                up</a>
        </div>
    </form>
</div>
