<div class="w-full mx-auto fade-in" style="max-width: 28rem">
    <div class="text-center mb-5">
        <h2 class="text-3xl font-bold text-base-content mb-2">Welcome Back</h2>
        <p class="text-base-content/70 m-0">Sign in to continue to Infimum</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

        @if (error()) {
        <div role="alert" class="alert alert-error text-sm py-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span>{{ error() }}</span>
        </div>
        }

        <app-input label="Email" formControlName="email" placeholder="Enter your email"
            [error]="(form.get('email')?.touched && form.get('email')?.invalid) ? 'Please enter a valid email' : ''"></app-input>

        <app-input label="Password" type="password" formControlName="password" placeholder="••••••••"
            [error]="(form.get('password')?.touched && form.get('password')?.invalid) ? 'Password is required' : ''"></app-input>

        <div class="flex items-center justify-between">
            <app-checkbox label="Remember me" formControlName="rememberMe"></app-checkbox>

            <a routerLink="/auth/forgot-password"
                class="link link-primary text-sm no-underline hover:underline cursor-pointer">
                Forgot password?
            </a>
        </div>

        <app-button label="Sign In" type="submit" [loading]="isLoading()" [fullWidth]="true"
            [disabled]="form.invalid"></app-button>

        <div class="text-center mt-2">
            <span class="text-base-content/70">Don't have an account?</span>
            <a routerLink="/auth/register"
                class="link link-primary font-bold ml-2 cursor-pointer no-underline hover:underline">Sign
                up</a>
        </div>
    </form>
</div>
