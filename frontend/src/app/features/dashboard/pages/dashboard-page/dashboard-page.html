<app-page-wrapper title="Dashboard">
  <div actions>
    <button type="button" class="btn btn-sm btn-outline" (click)="refresh()">
      <svg class="w-4 h-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 4v6h6M20 20v-6h-6M5 19a9 9 0 0114-7.5L20 10M4 14l1 1a9 9 0 0014 1.5L20 14" />
      </svg>
      Refresh
    </button>
  </div>

  @if (isLoading()) {
  <app-loading-skeleton />
  } @else {
  <div class="grid grid-cols-12 gap-6">
    @for (stat of stats(); track stat.title) {
    <div class="col-span-12 md:col-span-6 lg:col-span-3">
      <app-card>
        <div class="stat p-0">
          <div class="stat-figure text-secondary">
            <div class="w-10 h-10 rounded-lg flex items-center justify-center bg-base-200 text-base-content">
              <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3v18h18M7 14l3-3 3 3 6-6" />
              </svg>
            </div>
          </div>
          <div class="stat-title">{{ stat.title }}</div>
          <div class="stat-value text-2xl">{{ stat.value }}</div>
          <div class="stat-desc flex items-center gap-1">
            <span [class]="stat.color + ' font-medium'">{{ stat.trend }}</span>
            <span>since last week</span>
          </div>
        </div>
      </app-card>
    </div>
    }

    <div class="col-span-12 lg:col-span-6">
      <app-card title="Revenue Overview" subtitle="Last 30 days">
        <div
          class="h-[300px] flex items-center justify-center bg-base-200/50 rounded border border-dashed border-base-300">
          <span class="text-base-content/50">Chart Placeholder</span>
        </div>
      </app-card>
    </div>

    <div class="col-span-12 lg:col-span-6">
      <app-card title="Recent Transactions">
        <div class="overflow-x-auto">
          <table class="table table-sm">
            <thead>
              <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Amount</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>#1234</td>
                <td>John Doe</td>
                <td>$120.00</td>
                <td>
                  <span class="badge badge-success badge-sm">Completed</span>
                </td>
              </tr>
              <tr>
                <td>#1235</td>
                <td>Jane Smith</td>
                <td>$85.00</td>
                <td>
                  <span class="badge badge-warning badge-sm">Pending</span>
                </td>
              </tr>
              <tr>
                <td>#1236</td>
                <td>Bob Johnson</td>
                <td>$245.00</td>
                <td>
                  <span class="badge badge-success badge-sm">Completed</span>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </app-card>
    </div>
  </div>
  }
</app-page-wrapper>
