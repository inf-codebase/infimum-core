<app-page-wrapper title="Content Management">
    <div actions>
        <app-button label="Create Post" variant="primary" icon="plus" />
    </div>

    <div class="grid gap-4">
        @for (post of posts(); track post.id) {
        <app-card>
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h3 class="font-bold text-lg hover:text-primary cursor-pointer">{{ post.title }}</h3>
                    <p class="text-sm text-base-content/70">
                        By {{ post.author }} • {{ post.date }}
                    </p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="badge" [class.badge-primary]="post.status === 'Published'"
                        [class.badge-ghost]="post.status === 'Draft'">
                        {{ post.status }}
                    </div>
                    <div class="join">
                        <button class="btn btn-sm join-item">Edit</button>
                        <button class="btn btn-sm join-item">Preview</button>
                        <button class="btn btn-sm join-item text-error">Delete</button>
                    </div>
                </div>
            </div>
        </app-card>
        }
    </div>
</app-page-wrapper>
